name = "eigencircuits"
main = "src/entry.py"
compatibility_date = "2025-06-01"
compatibility_flags = ["python_workers"]
workers_dev = true

# Custom domain: also serve at eigencircuits.dwainosaur.com (app at root, same
# as the workers.dev subdomain). The dwainosaur.com zone is on Cloudflare, so
# wrangler creates the proxied DNS record automatically. Unlike *.workers.dev,
# this is reachable from mainland China.
[[routes]]
pattern = "eigencircuits.dwainosaur.com"
custom_domain = true

# Static assets: the built SPA, the vendored pdfTeX engine, and the self-hosted
# TeX Live mirror under /texlive/. `assets/` is assembled by `pnpm vendor`
# (see package.json) and is not checked in. Unknown paths fall back to
# index.html so client-side routes resolve.
[assets]
directory = "assets"
binding = "ASSETS"
not_found_handling = "single-page-application"

# The pure-Python engine is vendored next to the worker before deploy:
#   rm -rf src/eigencircuits_engine
#   cp -R ../../packages/engine/eigencircuits_engine src/eigencircuits_engine
# (wired up as the `vendor` step in package.json).
