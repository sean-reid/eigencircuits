[project]
name = "eigencircuits-engine"
version = "0.0.0"
description = "Context-sensitive grammar engine that generates arXiv-style mathematics papers."
requires-python = ">=3.11"
dependencies = []

[project.scripts]
eigencircuits = "eigencircuits_engine.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["eigencircuits_engine"]

[dependency-groups]
dev = ["pytest>=8.3", "mypy>=1.14", "ruff>=0.9"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
# En-dash is correct typography in names like "Wisconsin–Madison".
allowed-confusables = ["–"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true

[tool.pytest.ini_options]
testpaths = ["tests"]
